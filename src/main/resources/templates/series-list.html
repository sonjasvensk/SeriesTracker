<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeriesTracker</title>
</head>
<body>
<h1>SeriesTracker</h1>

<form th:action="@{/series}" th:object="${seriesForm}" method="post">
    <div>
        <label for="title">Title</label>
        <input id="title" type="text" th:field="*{title}">
        <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
    </div>

    <div>
        <label for="platform">Platform</label>
        <input id="platform" type="text" th:field="*{platform}">
        <p th:if="${#fields.hasErrors('platform')}" th:errors="*{platform}"></p>
    </div>

    <button type="submit">Add series</button>
</form>

<table>
    <thead>
    <tr>
        <th>Title</th>
        <th>Platform</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="series : ${seriesList}">
        <td th:text="${series.title}">Title</td>
        <td th:text="${series.platform}">Platform</td>
    </tr>
    </tbody>
</table>

<p th:if="${#lists.isEmpty(seriesList)}">No series yet.</p>
</body>
</html>
