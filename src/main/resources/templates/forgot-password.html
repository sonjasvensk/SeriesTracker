<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SeriesTracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container-box {
            background: #0f3460;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            padding: 2.5rem;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #00d4ff;
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 700;
        }
        .form-label {
            color: #e0e0e0;
            font-weight: 500;
        }
        .form-control {
            background: #1a1a2e;
            border: 2px solid #00d4ff;
            color: #e0e0e0;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: #0f3460;
            border-color: #00ff99;
            color: #e0e0e0;
            box-shadow: 0 0 12px rgba(0, 255, 153, 0.3);
        }
        .btn-send {
            background: linear-gradient(135deg, #00d4ff 0%, #00ff99 100%);
            border: none;
            color: #0f3460;
            font-weight: 700;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
        }
        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.4);
        }
        .success-message {
            background: #00ff99;
            color: #0f3460;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        .info-text {
            color: #a0a0a0;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .links-section {
            text-align: center;
            margin-top: 1.5rem;
        }
        .links-section a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 500;
        }
        .links-section a:hover {
            color: #00ff99;
        }
    </style>
</head>
<body>
<div class="container-box">
    <h1>🔑 Forgot Password?</h1>
    
    <p class="info-text">Enter your email address and we'll send you a link to reset your password.</p>

    <form th:action="@{/forgot-password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input id="email" type="email" name="email" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-send">Send Reset Link</button>
    </form>

    <div th:if="${message}" class="success-message" style="margin-top: 1.5rem;">
        <p th:text="${message}" style="margin: 0;"></p>
    </div>

    <div th:if="${resetLink}" class="alert alert-info" style="margin-top: 1rem; background: #1a3a52; border-color: #00d4ff; color: #e0e0e0;">
        <a th:href="@{${resetLink}}" class="btn btn-sm" style="background: #00d4ff; color: #0f3460; font-weight: 600;">
            ✓ Open Reset Page
        </a>
    </div>

    <div class="links-section">
        <p><a th:href="@{/login}">← Back to login</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
