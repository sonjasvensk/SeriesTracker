<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series admin</title>
</head>
<body>
<h1>Series admin</h1>

<p><a th:href="@{/series}">Public view</a></p>

<form th:action="@{/admin/series}" th:object="${seriesForm}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <div>
        <label for="title">Title</label>
        <input id="title" type="text" th:field="*{title}">
        <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
    </div>

    <div>
        <label for="platform">Platform</label>
        <input id="platform" type="text" th:field="*{platform}">
        <p th:if="${#fields.hasErrors('platform')}" th:errors="*{platform}"></p>
    </div>

    <div>
        <label for="genre">Genre</label>
        <input id="genre" type="text" th:field="*{genre}">
        <p th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></p>
    </div>

    <div>
        <label for="tags">Tags</label>
        <input id="tags" type="text" th:field="*{tags}">
        <p th:if="${#fields.hasErrors('tags')}" th:errors="*{tags}"></p>
    </div>

    <div>
        <label for="rating">Rating</label>
        <select id="rating" th:field="*{rating}">
            <option value="">Select</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
        <p th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}"></p>
    </div>

    <div>
        <label for="comment">Comment</label>
        <textarea id="comment" th:field="*{comment}" rows="4"></textarea>
        <p th:if="${#fields.hasErrors('comment')}" th:errors="*{comment}"></p>
    </div>

    <button type="submit">Add series</button>
</form>

<table>
    <thead>
    <tr>
        <th>Title</th>
        <th>Platform</th>
        <th>Genre</th>
        <th>Tags</th>
        <th>Rating</th>
        <th>Comment</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="series : ${seriesList}">
        <td th:text="${series.title}">Title</td>
        <td th:text="${series.platform}">Platform</td>
        <td th:text="${series.genre}">Genre</td>
        <td th:text="${series.tags}">Tags</td>
        <td th:text="${'★'.repeat(series.rating)}">Rating</td>
        <td th:text="${series.comment}">Comment</td>
        <td>
            <a th:href="@{/admin/series/{id}/edit(id=${series.id})}">Edit</a>
            <form th:action="@{/admin/series/{id}/delete(id=${series.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<p th:if="${#lists.isEmpty(seriesList)}">No series yet.</p>
</body>
</html>
