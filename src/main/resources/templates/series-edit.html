<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit series</title>
</head>
<body>
<h1>Edit series</h1>

<form th:action="@{/admin/series/{id}/edit(id=${seriesForm.id})}" th:object="${seriesForm}" method="post">
    <input type="hidden" th:field="*{id}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <div>
        <label for="title">Title</label>
        <input id="title" type="text" th:field="*{title}">
        <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
    </div>

    <div>
        <label for="platform">Platform</label>
        <input id="platform" type="text" th:field="*{platform}">
        <p th:if="${#fields.hasErrors('platform')}" th:errors="*{platform}"></p>
    </div>

    <div>
        <label for="genre">Genre</label>
        <select id="genre" th:field="*{genre}">
            <option value="">Select</option>
            <option th:each="genreOption : ${T(com.seriestracker.domain.Genre).values()}"
                    th:value="${genreOption.name()}"
                    th:text="${genreOption.label}"></option>
        </select>
        <p th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></p>
    </div>

    <div>
        <label for="tags">Tags</label>
        <input id="tags" type="text" th:field="*{tags}">
        <p th:if="${#fields.hasErrors('tags')}" th:errors="*{tags}"></p>
    </div>

    <div>
        <label for="rating">Rating</label>
        <select id="rating" th:field="*{rating}">
            <option value="">Select</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
        <p th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}"></p>
    </div>

    <div>
        <label for="comment">Comment</label>
        <textarea id="comment" th:field="*{comment}" rows="4"></textarea>
        <p th:if="${#fields.hasErrors('comment')}" th:errors="*{comment}"></p>
    </div>

    <button type="submit">Save changes</button>
</form>

<p><a th:href="@{/admin/series}">Back to admin</a></p>
</body>
</html>
