<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SeriesTracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container-box {
            background: #0f3460;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            padding: 2.5rem;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #00d4ff;
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 700;
        }
        .form-label {
            color: #e0e0e0;
            font-weight: 500;
        }
        .form-control {
            background: #1a1a2e;
            border: 2px solid #00d4ff;
            color: #e0e0e0;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: #0f3460;
            border-color: #00ff99;
            color: #e0e0e0;
            box-shadow: 0 0 12px rgba(0, 255, 153, 0.3);
        }
        .btn-reset {
            background: linear-gradient(135deg, #00d4ff 0%, #00ff99 100%);
            border: none;
            color: #0f3460;
            font-weight: 700;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
        }
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.4);
        }
        .error-alert {
            background: #ff6b6b;
            color: #fff;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        .error-text {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 0.35rem;
        }
        .links-section {
            text-align: center;
            margin-top: 1.5rem;
        }
        .links-section a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="container-box">
    <h1>🔐 Reset Password</h1>
    
    <div th:if="${invalidToken}" class="error-alert">
        ⚠ Token is invalid or expired. Please request a new password reset.
    </div>

    <form th:if="${!invalidToken}" th:action="@{/reset-password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" name="token" th:value="${token}">

        <div class="mb-3">
            <label for="password" class="form-label">New Password</label>
            <input id="password" type="password" name="password" class="form-control" required>
        </div>

        <p th:if="${passwordError}" class="error-text" th:text="${passwordError}"></p>

        <button type="submit" class="btn btn-reset">Update Password</button>
    </form>

    <div class="links-section">
        <p><a th:href="@{/login}">← Back to login</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
