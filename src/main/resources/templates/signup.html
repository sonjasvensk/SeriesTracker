<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SeriesTracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .signup-container {
            background: #0f3460;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            padding: 2.5rem;
            max-width: 450px;
            width: 100%;
        }
        .signup-container h1 {
            color: #00d4ff;
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 700;
        }
        .form-label {
            color: #e0e0e0;
            font-weight: 500;
            margin-top: 1rem;
        }
        .form-control {
            background: #1a1a2e;
            border: 2px solid #00d4ff;
            color: #e0e0e0;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background: #0f3460;
            border-color: #00ff99;
            color: #e0e0e0;
            box-shadow: 0 0 12px rgba(0, 255, 153, 0.3);
        }
        .btn-signup {
            background: linear-gradient(135deg, #00d4ff 0%, #00ff99 100%);
            border: none;
            color: #0f3460;
            font-weight: 700;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            width: 100%;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
        }
        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.4);
        }
        .error-text {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 0.35rem;
            font-weight: 500;
        }
        .links-section {
            text-align: center;
            margin-top: 1.5rem;
        }
        .links-section a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 500;
        }
        .links-section a:hover {
            color: #00ff99;
        }
        .links-section p {
            margin: 0.75rem 0;
            color: #a0a0a0;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
<div class="signup-container">
    <h1>✨ Create Account</h1>

    <form th:action="@{/signup}" th:object="${user}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input id="username" type="text" th:field="*{username}" class="form-control" required>
            <div th:if="${#fields.hasErrors('username')}" class="error-text" th:errors="*{username}"></div>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input id="email" type="email" th:field="*{email}" class="form-control" required>
            <div th:if="${#fields.hasErrors('email')}" class="error-text" th:errors="*{email}"></div>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Password (min 6 characters)</label>
            <input id="password" type="password" th:field="*{password}" class="form-control" required>
            <div th:if="${#fields.hasErrors('password')}" class="error-text" th:errors="*{password}"></div>
        </div>

        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <input id="confirmPassword" type="password" class="form-control" required>
            <div id="passwordError" class="error-text" style="display: none;">Passwords do not match</div>
        </div>

        <button type="submit" class="btn btn-signup" onclick="return validatePasswords()">Create Account</button>

        <script>
            function validatePasswords() {
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const errorDiv = document.getElementById('passwordError');
                
                if (password !== confirmPassword) {
                    errorDiv.style.display = 'block';
                    return false;
                } else {
                    errorDiv.style.display = 'none';
                    return true;
                }
            }
        </script>
    </form>

    <div class="links-section">
        <p>Already have an account? <a th:href="@{/login}">Login here</a></p>
        <p><a th:href="@{/}">← Home</a></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
